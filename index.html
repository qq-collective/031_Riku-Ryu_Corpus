<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riku-Ryu Corpus | QQ #031</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f2ed; }
    @keyframes pulse { 0%,100%{opacity:0.2} 50%{opacity:1} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const PROFESSIONS = [
      { id: "historian", label: "歴史学研究者", emoji: "📜", en: "historian" },
      { id: "anthropologist", label: "文化人類学研究者", emoji: "🌍", en: "cultural anthropologist" },
      { id: "physicist", label: "物理学者", emoji: "⚛️", en: "physicist" },
      { id: "journalist", label: "ジャーナリスト", emoji: "📰", en: "journalist" },
      { id: "lawyer", label: "弁護士・法律家", emoji: "⚖️", en: "lawyer" },
      { id: "engineer", label: "エンジニア", emoji: "🔧", en: "software engineer" },
      { id: "doctor", label: "医師・医療従事者", emoji: "🩺", en: "medical doctor" },
      { id: "economist", label: "経済学者", emoji: "📊", en: "economist" },
    ];

    const PAIRS_PROMPT = (profession) => `You are an expert English vocabulary teacher specializing in corpus-based learning.
The user is a ${profession}.
Suggest 8 English word pairs that are commonly confused or have subtle usage differences specifically relevant to a ${profession}'s work.
Rules:
- Both words must translate to the same Japanese word or very similar expressions
- Pairs must be genuinely relevant to ${profession}'s daily reading/writing
- Focus on USAGE differences, not definition differences
- Return ONLY valid JSON, no markdown, no explanation
{"pairs":[{"word1":"listen","word2":"hear","japanese":"聞く","context":"Both mean 聞く but differ in intention"}]}`;

    const SENTENCES_PROMPT = (word1, word2, profession) => `You are a corpus-based English vocabulary teacher.
Generate example sentences for "${word1}" vs "${word2}" for a ${profession}.
Rules:
- 3 textbook-style + 3 academic paper-style sentences per word (12 total)
- Each: English (bold target word as **word**) + Japanese translation + context tag "textbook" or "academic"
- NO explanation, NO grammar rules
- Return ONLY valid JSON
{"word1_sentences":[{"en":"The researcher **listened** carefully.","ja":"研究者は注意深く耳を傾けた。","context":"academic"}],"word2_sentences":[{"en":"She **heard** distant drums.","ja":"遠くの太鼓が聞こえた。","context":"textbook"}]}`;

    const ADVERBS_PROMPT = (word1, word2, profession) => `You are a corpus-based English vocabulary teacher.
Generate adverb collocations for "${word1}" and "${word2}" used by a ${profession}.
Rules:
- 5 adverbs per word that commonly co-occur in ${profession} contexts
- Each: adverb + short example phrase + Japanese
- Return ONLY valid JSON, no markdown
{"word1_adverbs":[{"adverb":"carefully","example":"listen carefully to testimonies","ja":"証言に注意深く耳を傾ける"}],"word2_adverbs":[{"adverb":"faintly","example":"heard faintly in the distance","ja":"遠くからかすかに聞こえた"}]}`;

    const SUMMARY_PROMPT = (word1, word2, profession) => `You are a corpus-based English vocabulary teacher.
After showing many example sentences, now give a brief intuitive explanation of the usage difference between "${word1}" and "${word2}" for a ${profession}.
Rules:
- Write in Japanese
- 3-4 sentences maximum, conversational tone
- Focus on the FEELING/INTUITION of the difference, not grammar rules
- Give one memorable tip or analogy if possible
- Return ONLY valid JSON, no markdown
{"summary":"listenは意識を向けて聴く行為そのものを指します。hearは音が耳に届く、という受動的な知覚です。"}`;

    async function callClaude(apiKey, prompt, userMessage, maxTokens = 2000) {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: maxTokens,
          system: prompt,
          messages: [{ role: "user", content: userMessage }],
        }),
      });
      const data = await response.json();
      if (!data.content) throw new Error("API error: " + JSON.stringify(data));
      const text = data.content.map((i) => i.text || "").join("");
      const match = text.match(/\{[\s\S]*\}/);
      if (!match) throw new Error("No JSON in response");
      return JSON.parse(match[0]);
    }

    function boldify(text, color) {
      const parts = text.split(/\*\*(.*?)\*\*/g);
      return parts.map((p, i) =>
        i % 2 === 1 ? React.createElement("strong", { key: i, style: { color, fontWeight: 700 } }, p) : p
      );
    }

    const GOLD = "#9a6e2a";
    const BLUE = "#2a5ea8";
    const GOLD_BG = "#fdf8f0";
    const BLUE_BG = "#f0f4fd";
    const GOLD_BORDER = "#c8a050";
    const BLUE_BORDER = "#4a7ec8";

    function ApiKeyForm({ onSubmit }) {
      const [key, setKey] = useState(localStorage.getItem("riku_ryu_api_key") || "");
      return (
        <div style={{ minHeight: "100vh", background: "#f5f2ed", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ background: "#fff", border: "1px solid #e0dbd4", borderRadius: 8, padding: "40px 36px", maxWidth: 400, width: "90%" }}>
            <div style={{ fontSize: 9, letterSpacing: "0.2em", color: "#ccc", textTransform: "uppercase", marginBottom: 4 }}>QQ #031</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: GOLD, marginBottom: 8 }}>Riku-Ryu Corpus</div>
            <div style={{ fontSize: 12, color: "#999", marginBottom: 28, lineHeight: 1.7 }}>
              Anthropic APIキーを入力してください。<br />
              キーはブラウザに保存されます。
            </div>
            <input
              type="password"
              value={key}
              onChange={e => setKey(e.target.value)}
              placeholder="sk-ant-..."
              style={{
                width: "100%", padding: "10px 12px", border: "1px solid #ddd",
                borderRadius: 4, fontSize: 13, marginBottom: 14, outline: "none",
                fontFamily: "monospace",
              }}
            />
            <button
              onClick={() => { localStorage.setItem("riku_ryu_api_key", key); onSubmit(key); }}
              disabled={!key.startsWith("sk-")}
              style={{
                width: "100%", padding: "11px", background: key.startsWith("sk-") ? GOLD : "#ddd",
                color: "#fff", border: "none", borderRadius: 4, fontSize: 13,
                cursor: key.startsWith("sk-") ? "pointer" : "default", fontWeight: 700,
              }}
            >はじめる</button>
          </div>
        </div>
      );
    }

    function AdverbChips({ adverbs, loading, color, bg, border }) {
      return (
        <div style={{ marginTop: 10, padding: "10px 14px", background: bg, border: `1px solid ${border}`, borderRadius: 4, minHeight: 52 }}>
          <div style={{ fontSize: 10, letterSpacing: "0.12em", color, marginBottom: 8, fontWeight: 700, textTransform: "uppercase" }}>
            よく一緒に使われる副詞
          </div>
          {loading ? (
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ width: 24, height: 2, background: color, animation: "pulse 1s ease-in-out infinite" }} />
              <span style={{ fontSize: 10, color: "#bbb" }}>読み込み中...</span>
            </div>
          ) : !adverbs || adverbs.length === 0 ? (
            <div style={{ fontSize: 10, color: "#ccc" }}>—</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {adverbs.map((a, i) => (
                <div key={i} style={{ display: "flex", alignItems: "baseline", gap: 7, flexWrap: "wrap" }}>
                  <span style={{ background: color, color: "#fff", padding: "1px 7px", fontSize: 11, fontWeight: 700, borderRadius: 2, whiteSpace: "nowrap", flexShrink: 0 }}>{a.adverb}</span>
                  <span style={{ fontSize: 11, color: "#666", fontStyle: "italic" }}>{a.example}</span>
                  <span style={{ fontSize: 10, color: "#bbb" }}>{a.ja}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function SentenceList({ sentences, filter, color }) {
      const filtered = filter === "all" ? sentences : sentences.filter(s => s.context === filter);
      if (!filtered || filtered.length === 0) {
        return <div style={{ padding: "18px 14px", fontSize: 11, color: "#bbb", textAlign: "center" }}>該当する例文がありません</div>;
      }
      return (
        <div>
          {filtered.map((s, i) => (
            <div key={i} style={{
              padding: "11px 14px",
              borderBottom: i < filtered.length - 1 ? "1px solid #f0ece6" : "none",
              background: s.context === "academic" ? "rgba(240,244,253,0.4)" : "#fff",
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 6 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, lineHeight: 1.7, marginBottom: 3 }}>{boldify(s.en, color)}</div>
                  <div style={{ fontSize: 11, color: "#999", lineHeight: 1.5 }}>{s.ja}</div>
                </div>
                <span style={{
                  fontSize: 9, padding: "2px 5px", borderRadius: 2, flexShrink: 0, marginTop: 3,
                  background: s.context === "academic" ? "#dce6f8" : "#f0ece4",
                  color: s.context === "academic" ? "#2a5ea8" : "#7a5a2a", fontWeight: 600,
                }}>
                  {s.context === "academic" ? "論文" : "教科書"}
                </span>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function App() {
      const [apiKey, setApiKey] = useState(localStorage.getItem("riku_ryu_api_key") || "");
      const [step, setStep] = useState("intro");
      const [selectedProfession, setSelectedProfession] = useState(null);
      const [pairs, setPairs] = useState([]);
      const [selectedPair, setSelectedPair] = useState(null);
      const [sentences, setSentences] = useState(null);
      const [adverbs, setAdverbs] = useState(null);
      const [summary, setSummary] = useState(null);
      const [loadingMain, setLoadingMain] = useState(false);
      const [loadingAdverbs, setLoadingAdverbs] = useState(false);
      const [loadingSummary, setLoadingSummary] = useState(false);
      const [error, setError] = useState(null);
      const [sentenceFilter, setSentenceFilter] = useState("all");

      if (!apiKey || !apiKey.startsWith("sk-")) {
        return <ApiKeyForm onSubmit={setApiKey} />;
      }

      async function handleProfessionSelect(prof) {
        setSelectedProfession(prof);
        setLoadingMain(true);
        setError(null);
        try {
          const result = await callClaude(apiKey, PAIRS_PROMPT(prof.en), `I am a ${prof.en}. Suggest word pairs.`);
          setPairs(result.pairs);
          setStep("pairs");
        } catch (e) {
          setError("単語ペアの生成に失敗: " + e.message);
        } finally {
          setLoadingMain(false);
        }
      }

      async function handlePairSelect(pair) {
        setSelectedPair(pair);
        setLoadingMain(true);
        setAdverbs(null); setSentences(null); setSummary(null);
        setError(null); setSentenceFilter("all");
        try {
          const sentResult = await callClaude(apiKey, SENTENCES_PROMPT(pair.word1, pair.word2, selectedProfession.en), `Examples for "${pair.word1}" vs "${pair.word2}"`);
          setSentences(sentResult);
          setStep("examples");
          setLoadingMain(false);
          setLoadingAdverbs(true); setLoadingSummary(true);
          try {
            const [advResult, sumResult] = await Promise.allSettled([
              callClaude(apiKey, ADVERBS_PROMPT(pair.word1, pair.word2, selectedProfession.en), `Adverbs for "${pair.word1}" vs "${pair.word2}"`, 1000),
              callClaude(apiKey, SUMMARY_PROMPT(pair.word1, pair.word2, selectedProfession.en), `Summary for "${pair.word1}" vs "${pair.word2}"`, 600),
            ]);
            setAdverbs(advResult.status === "fulfilled" ? advResult.value : { word1_adverbs: [], word2_adverbs: [] });
            setSummary(sumResult.status === "fulfilled" ? sumResult.value.summary : null);
          } finally {
            setLoadingAdverbs(false); setLoadingSummary(false);
          }
        } catch (e) {
          setError("例文の生成に失敗: " + e.message);
          setLoadingMain(false);
        }
      }

      function reset() {
        setStep("intro"); setSelectedProfession(null); setPairs([]);
        setSelectedPair(null); setSentences(null); setAdverbs(null); setSummary(null);
        setError(null); setSentenceFilter("all");
        setLoadingMain(false); setLoadingAdverbs(false); setLoadingSummary(false);
      }

      const filterTabs = [
        { id: "all", label: "すべて" },
        { id: "textbook", label: "📖 教科書" },
        { id: "academic", label: "🎓 論文" },
      ];

      return (
        <div style={{ minHeight: "100vh", background: "#f5f2ed", color: "#2a2218", fontFamily: "Georgia, 'Noto Serif JP', serif" }}>
          <div style={{ borderBottom: "1px solid #ddd8ce", padding: "18px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", background: "#fff", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
            <div>
              <div style={{ fontSize: 9, letterSpacing: "0.2em", color: "#ccc", textTransform: "uppercase", marginBottom: 2 }}>Corpus-Based Vocabulary</div>
              <div style={{ fontSize: 19, fontWeight: 700, color: GOLD }}>Riku-Ryu Corpus</div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              {step !== "intro" && (
                <button onClick={reset} style={{ background: "transparent", border: "1px solid #ddd", color: "#aaa", padding: "6px 12px", cursor: "pointer", fontSize: 11, borderRadius: 3 }}>← 最初から</button>
              )}
              <button onClick={() => { localStorage.removeItem("riku_ryu_api_key"); setApiKey(""); }} style={{ background: "transparent", border: "1px solid #eee", color: "#ccc", padding: "6px 10px", cursor: "pointer", fontSize: 10, borderRadius: 3 }}>🔑</button>
            </div>
          </div>

          <div style={{ maxWidth: 760, margin: "0 auto", padding: "28px 16px" }}>
            {error && <div style={{ background: "#fff0f0", border: "1px solid #f0b0b0", padding: 12, marginBottom: 18, color: "#c04040", fontSize: 11, borderRadius: 4 }}>{error}</div>}

            {loadingMain && (
              <div style={{ textAlign: "center", padding: "60px 0" }}>
                <div style={{ fontSize: 11, color: "#ccc", letterSpacing: "0.15em" }}>generating...</div>
                <div style={{ width: 36, height: 2, background: GOLD, margin: "12px auto 0", animation: "pulse 1s ease-in-out infinite" }} />
              </div>
            )}

            {step === "intro" && !loadingMain && (
              <div>
                <p style={{ fontSize: 13, color: "#888", lineHeight: 1.9, marginBottom: 28 }}>
                  あなたの専門分野を選んでください。<br />「同じ日本語に訳されるけど使い分けが難しい」英単語ペアを提案します。
                </p>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  {PROFESSIONS.map((prof) => (
                    <button key={prof.id} onClick={() => handleProfessionSelect(prof)}
                      style={{ background: "#fff", border: "1px solid #e0dbd4", color: "#2a2218", padding: "14px 16px", cursor: "pointer", textAlign: "left", fontSize: 13, borderRadius: 6, display: "flex", alignItems: "center", gap: 10 }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = GOLD; e.currentTarget.style.background = GOLD_BG; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = "#e0dbd4"; e.currentTarget.style.background = "#fff"; }}
                    >
                      <span style={{ fontSize: 18 }}>{prof.emoji}</span>
                      <span>{prof.label}</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {step === "pairs" && !loadingMain && (
              <div>
                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 9, color: "#ccc", letterSpacing: "0.15em", marginBottom: 5 }}>{selectedProfession.emoji} {selectedProfession.label} 向け</div>
                  <div style={{ fontSize: 15, color: GOLD, fontWeight: 600 }}>気になる単語ペアを選んでください</div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
                  {pairs.map((pair, i) => (
                    <button key={i} onClick={() => handlePairSelect(pair)}
                      style={{ background: "#fff", border: "1px solid #e0dbd4", color: "#2a2218", padding: "12px 16px", cursor: "pointer", textAlign: "left", fontSize: 13, borderRadius: 5 }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = GOLD; e.currentTarget.style.background = GOLD_BG; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = "#e0dbd4"; e.currentTarget.style.background = "#fff"; }}
                    >
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
                        <span style={{ color: GOLD, fontWeight: 700, fontSize: 14 }}>{pair.word1}</span>
                        <span style={{ color: "#ddd", fontSize: 11 }}>vs</span>
                        <span style={{ color: GOLD, fontWeight: 700, fontSize: 14 }}>{pair.word2}</span>
                        <span style={{ color: "#bbb", fontSize: 11, marginLeft: "auto" }}>「{pair.japanese}」</span>
                      </div>
                      <div style={{ fontSize: 11, color: "#aaa" }}>{pair.context}</div>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {step === "examples" && !loadingMain && sentences && (
              <div>
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 9, color: "#ccc", letterSpacing: "0.15em", marginBottom: 5 }}>コーパス例文</div>
                  <div style={{ fontSize: 17, fontWeight: 700 }}>
                    <span style={{ color: GOLD }}>{selectedPair.word1}</span>
                    <span style={{ color: "#ddd", fontSize: 13, margin: "0 8px" }}>vs</span>
                    <span style={{ color: BLUE }}>{selectedPair.word2}</span>
                  </div>
                  <div style={{ fontSize: 11, color: "#bbb", marginTop: 3 }}>どちらも「{selectedPair.japanese}」— 例文の海から違いを感じてください</div>
                </div>

                <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
                  {filterTabs.map(tab => (
                    <button key={tab.id} onClick={() => setSentenceFilter(tab.id)}
                      style={{ padding: "4px 12px", fontSize: 11, cursor: "pointer", borderRadius: 20, border: sentenceFilter === tab.id ? `1px solid ${GOLD}` : "1px solid #ddd", background: sentenceFilter === tab.id ? GOLD_BG : "#fff", color: sentenceFilter === tab.id ? GOLD : "#999", fontWeight: sentenceFilter === tab.id ? 700 : 400 }}
                    >{tab.label}</button>
                  ))}
                </div>

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                  <div>
                    <div style={{ background: GOLD_BG, border: `1px solid ${GOLD_BORDER}`, borderBottom: "none", padding: "7px 14px", fontSize: 11, color: GOLD, fontWeight: 700, letterSpacing: "0.1em", borderRadius: "4px 4px 0 0" }}>{selectedPair.word1.toUpperCase()}</div>
                    <div style={{ border: "1px solid #e8e4de", borderTop: "none", background: "#fff", borderRadius: "0 0 4px 4px" }}>
                      <SentenceList sentences={sentences.word1_sentences} filter={sentenceFilter} color={GOLD} />
                    </div>
                    <AdverbChips adverbs={adverbs && adverbs.word1_adverbs} loading={loadingAdverbs} color={GOLD} bg={GOLD_BG} border={GOLD_BORDER} />
                  </div>
                  <div>
                    <div style={{ background: BLUE_BG, border: `1px solid ${BLUE_BORDER}`, borderBottom: "none", padding: "7px 14px", fontSize: 11, color: BLUE, fontWeight: 700, letterSpacing: "0.1em", borderRadius: "4px 4px 0 0" }}>{selectedPair.word2.toUpperCase()}</div>
                    <div style={{ border: "1px solid #e8e4de", borderTop: "none", background: "#fff", borderRadius: "0 0 4px 4px" }}>
                      <SentenceList sentences={sentences.word2_sentences} filter={sentenceFilter} color={BLUE} />
                    </div>
                    <AdverbChips adverbs={adverbs && adverbs.word2_adverbs} loading={loadingAdverbs} color={BLUE} bg={BLUE_BG} border={BLUE_BORDER} />
                  </div>
                </div>

                {(loadingSummary || summary) && (
                  <div style={{ marginTop: 20, padding: "16px 20px", background: "#fff", border: "1px solid #e0dbd4", borderLeft: `3px solid ${GOLD}`, borderRadius: 4 }}>
                    <div style={{ fontSize: 10, letterSpacing: "0.12em", color: GOLD, fontWeight: 700, marginBottom: 10, textTransform: "uppercase" }}>💡 結局どう違うの？</div>
                    {loadingSummary ? (
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <div style={{ width: 24, height: 2, background: GOLD, animation: "pulse 1s ease-in-out infinite" }} />
                        <span style={{ fontSize: 11, color: "#bbb" }}>まとめを生成中...</span>
                      </div>
                    ) : (
                      <p style={{ fontSize: 13, color: "#444", lineHeight: 1.9, margin: 0 }}>{summary}</p>
                    )}
                  </div>
                )}

                <div style={{ marginTop: 18, display: "flex", gap: 8 }}>
                  <button onClick={() => { setStep("pairs"); setSentences(null); setAdverbs(null); }}
                    style={{ background: "#fff", border: "1px solid #ddd", color: "#999", padding: "8px 16px", cursor: "pointer", fontSize: 12, borderRadius: 4 }}>← 別のペアを選ぶ</button>
                  <button onClick={() => handlePairSelect(selectedPair)}
                    style={{ background: GOLD_BG, border: `1px solid ${GOLD}`, color: GOLD, padding: "8px 16px", cursor: "pointer", fontSize: 12, borderRadius: 4 }}>↻ 別の例文を生成</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
