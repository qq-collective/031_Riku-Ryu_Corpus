<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>teto-flo — QuestQueries No.3</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

:root {
  --ink: #1a1a2e;
  --paper: #f5f0e8;
  --warm: #faf6ef;
  --accent: #c84b31;
  --gold: #d4a847;
  --sage: #5a7a6a;
  --mist: #e8e0d4;
  --teto: #8b6f9e;
  --teto-light: #f2edf7;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
.app-header {
  background: var(--ink);
  padding: 14px 24px;
  display: flex; align-items: center; gap: 14px;
  border-bottom: 3px solid var(--accent);
  flex-shrink: 0;
}
.header-fox { font-size: 28px; animation: breathe 4s ease-in-out infinite; }
@keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
.header-title { flex: 1; }
.header-title h1 { font-size: 20px; font-weight: 900; color: #fff; line-height: 1.1; }
.header-title h1 span { color: var(--gold); }
.header-label { font-family: 'Space Mono', monospace; font-size: 10px; color: #888; letter-spacing: 0.2em; }
.key-indicator {
  font-family: 'Space Mono', monospace; font-size: 10px; color: #888;
  cursor: pointer; padding: 4px 8px; border: 1px solid #444; border-radius: 2px; transition: all 0.15s;
}
.key-indicator:hover { color: #fff; border-color: #fff; }
.key-indicator.active { color: var(--gold); border-color: var(--gold); }

/* ── LEAD ── */
.lead-banner {
  background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 100%);
  padding: 8px 24px;
  border-bottom: 1px solid #333;
  text-align: center;
  flex-shrink: 0;
}
.lead-banner p { font-size: 13px; color: #ccc; letter-spacing: 0.05em; line-height: 1.5; }
.lead-banner p strong { color: var(--gold); }

/* ── MAIN: 1カラム ── */
.chat-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--warm);
  min-height: 0;
}

/* ── MESSAGES ── */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}
/* PC では最大幅を制限して読みやすく */
@media (min-width: 768px) {
  .chat-messages { padding: 24px calc(50% - 360px); }
}

.msg { display: flex; gap: 10px; max-width: 100%; }
.msg.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--ink); color: #fff;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
}
.msg.teto .msg-avatar { background: var(--teto); font-size: 16px; }
.msg-bubble {
  max-width: min(480px, calc(100% - 46px));
  padding: 12px 16px; border-radius: 4px; font-size: 14px; line-height: 1.7;
}
.msg.teto .msg-bubble {
  background: #fff; border: 1.5px solid var(--teto-light);
  border-top-left-radius: 0; box-shadow: 2px 2px 0 var(--teto-light);
  white-space: pre-wrap;
}
.msg.user .msg-bubble {
  background: var(--ink); color: #fff; border-top-right-radius: 0;
  white-space: pre-wrap;
}
.msg-time {
  font-family: 'Space Mono', monospace; font-size: 10px; color: #aaa;
  margin-top: 4px; text-align: right;
}
.msg.teto .msg-time { text-align: left; }

/* ── プレビューカード（チャット内に埋め込み） ── */
.chart-preview-card {
  width: 100%;
  max-width: 600px;
  background: #fff;
  border: 2px solid var(--teto);
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 4px 4px 0 var(--teto-light);
}
.chart-preview-header {
  background: var(--ink); color: #fff;
  padding: 10px 16px;
  display: flex; justify-content: space-between; align-items: center;
}
.chart-preview-header span { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.1em; }
.chart-preview-header .preview-tag {
  background: var(--gold); color: var(--ink);
  font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 2px;
  letter-spacing: 0.1em;
}
.chart-preview-body { padding: 4px 0; }
.plan-row { display: flex; gap: 8px; padding: 7px 16px; border-bottom: 1px solid var(--mist); font-size: 13px; }
.plan-row:last-child { border-bottom: none; }
.plan-label { font-weight: 700; color: var(--sage); white-space: nowrap; min-width: 80px; font-family: 'Space Mono', monospace; font-size: 10px; padding-top: 2px; }
.plan-value { flex: 1; line-height: 1.6; }
.plan-a { color: #2e7d32; font-weight: 700; }
.plan-b { color: #e65100; font-weight: 700; }
.plan-c { color: #c62828; font-weight: 700; }
.chart-preview-mermaid { padding: 12px 16px 4px; overflow-x: auto; }
.chart-preview-mermaid .mermaid-label {
  font-family: 'Space Mono', monospace; font-size: 9px; color: #aaa;
  letter-spacing: 0.2em; margin-bottom: 8px;
}
.chart-preview-actions {
  padding: 12px 16px;
  background: var(--teto-light);
  display: flex; gap: 8px; align-items: center;
  border-top: 1px solid #e0d8f0;
}
.chart-preview-actions p {
  flex: 1; font-size: 12px; color: var(--teto); font-weight: 700;
}
.btn-save-html {
  background: var(--teto); color: #fff;
  border: none; border-radius: 4px;
  padding: 8px 20px;
  font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
  cursor: pointer; white-space: nowrap; transition: background 0.15s;
}
.btn-save-html:hover { background: var(--ink); }
.btn-copy-html {
  background: transparent; color: var(--teto);
  border: 1.5px solid var(--teto); border-radius: 4px;
  padding: 8px 14px;
  font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
  cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.btn-copy-html:hover { background: var(--teto); color: #fff; }

/* タイピング */
.typing-indicator {
  display: flex; gap: 4px; padding: 12px 16px; background: #fff;
  border: 1.5px solid var(--teto-light); border-radius: 4px; border-top-left-radius: 0; width: fit-content;
}
.typing-indicator span {
  width: 7px; height: 7px; border-radius: 50%; background: var(--teto);
  animation: typing 1.2s ease-in-out infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }

/* ── INPUT ── */
.chat-input-area {
  padding: 16px 20px;
  background: #fff;
  border-top: 2px solid var(--mist);
  flex-shrink: 0;
}
@media (min-width: 768px) {
  .chat-input-area { padding: 16px calc(50% - 360px); }
}
.chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
.chat-input {
  flex: 1; border: 2px solid var(--mist); border-radius: 4px; padding: 10px 14px;
  font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 14px; resize: none;
  min-height: 44px; max-height: 120px; outline: none; transition: border-color 0.2s; line-height: 1.5;
}
.chat-input:focus { border-color: var(--teto); }
.send-btn {
  background: var(--ink); color: #fff; border: none; border-radius: 4px; padding: 10px 20px;
  font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: background 0.2s; white-space: nowrap;
}
.send-btn:hover { background: var(--teto); }
.send-btn:disabled { background: #ccc; cursor: not-allowed; }
.hint-text { font-family: 'Space Mono', monospace; font-size: 10px; color: #aaa; margin-top: 8px; text-align: center; }

/* スピナー */
.spinner { width: 28px; height: 28px; border: 3px solid var(--teto-light); border-top-color: var(--teto); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(26,26,46,0.7);
  backdrop-filter: blur(4px); z-index: 1000;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.hidden { display: none; }
.modal-box {
  background: #fff; border: 3px solid var(--ink); border-radius: 4px;
  padding: 36px 32px; max-width: 440px; width: 100%; box-shadow: 8px 8px 0 var(--ink);
}
.modal-fox { font-size: 40px; text-align: center; margin-bottom: 16px; display: block; }
.modal-title { font-size: 20px; font-weight: 900; margin-bottom: 6px; text-align: center; }
.modal-sub { font-size: 13px; color: #666; text-align: center; margin-bottom: 24px; line-height: 1.6; }
.modal-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
.modal-input {
  flex: 1; border: 2px solid var(--mist); border-radius: 4px; padding: 10px 14px;
  font-family: 'Space Mono', monospace; font-size: 12px; outline: none; transition: border-color 0.2s;
}
.modal-input:focus { border-color: var(--teto); }
.modal-btn {
  background: var(--ink); color: #fff; border: none; border-radius: 4px; padding: 10px 20px;
  font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; cursor: pointer; transition: background 0.15s;
}
.modal-btn:hover { background: var(--teto); }
.modal-note { font-size: 11px; color: #aaa; line-height: 1.6; text-align: center; }
.modal-note a { color: var(--teto); text-decoration: none; }
.modal-note a:hover { text-decoration: underline; }
.modal-error { font-size: 12px; color: var(--accent); text-align: center; margin-bottom: 10px; min-height: 16px; }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-fox">🦊</div>
  <div class="header-title">
    <div class="header-label">QUESTQUERIES / NO.3</div>
    <h1>teto-<span>flo</span></h1>
  </div>
  <div class="key-indicator" id="keyIndicator" onclick="showKeyModal()">🔑 APIキー未設定</div>
</header>

<div class="lead-banner">
  <p>テトがあなたの悩みを解決に導きます。<strong>一つ一つの問いかけに答えてみてください。</strong></p>
</div>

<!-- APIキーモーダル -->
<div class="modal-overlay" id="keyModal">
  <div class="modal-box">
    <span class="modal-fox">🦊</span>
    <div class="modal-title" id="modalTitle">APIキーを設定してね</div>
    <div class="modal-sub">テトを動かすにはAnthropicのAPIキーが必要。<br>キーはこのブラウザにだけ保存されるよ。</div>
    <div id="modalStatus" style="font-size:13px;color:#4a8a30;margin-bottom:8px;"></div>
    <div class="modal-error" id="keyError"></div>
    <div class="modal-input-row">
      <input type="password" class="modal-input" id="keyInput" placeholder="sk-ant-..." autocomplete="off">
      <button class="modal-btn" onclick="saveApiKey()">保存</button>
    </div>
    <div class="modal-note">
      キーは <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a> で取得できる。<br>
      月の使用上限を設定しておくのをおすすめするよ。<br>
      <a href="https://console.anthropic.com/settings/limits" target="_blank">使用量上限の設定はこちら →</a>
    </div>
  </div>
</div>

<!-- メイン：1カラム -->
<div class="chat-panel">
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-area">
    <div class="chat-input-row">
      <textarea class="chat-input" id="userInput"
        placeholder="どんなことでも話しかけてみて" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">送る</button>
    </div>
    <div class="hint-text">Enter で送信 / Shift+Enter で改行</div>
  </div>
</div>

<script>
// ── SYSTEM PROMPT ──
const TETO_SYSTEM = `あなたは「テト」という名の相棒AIです。ユーザーの悩みに寄り添い、一緒に解決の道筋を作ります。

## キャラクター
- 無口だが温かい。ナウシカのテトのような「信頼できる小さな存在」
- 押しつけず、寄り添う。ゆるいテンションで、でも深いところまで掘る
- 友達に相談してる感覚で話せる
- 提案型：ユーザーにゼロから考えさせず、常に「叩き台」を提示する

## 対話の核心：How do you want to BE / DO
「なぜできないの？」と原因を問い詰めない。
「どうなりたい？」「どうしたい？」を軸に、未来から逆算して掘る。

---

## フェーズ1：最初の3往復（聞く・掘る）

まず純粋に聞く。解決しようとしない。
1往復目：相手の話を受け止めて、一番気になるところを1つだけ聞く
2往復目：BE/DO軸で掘る（「それができてたらどんな感じ？」「理想の状態って？」）
3往復目：障害や状況の違いを探る（「できない日って何が違う？」）

**分岐の芽を常に探す：**
ユーザーの言葉に「〜の時は」「〜な日は」「〜によって」「〜だったら」が出たら分岐の芽。
見つけたら「○○と△△で違う感じ？」と確認する。
分岐の芽が2つ以上出てきたらフローチャートの候補。

---

## フェーズ2：3往復後の「着地確認」（必須）

3往復したら、必ず一度メタに上がって着地点を確認する。
会話を続けるのではなく、今の状況を整理して選択肢を出す。

**着地確認の書き方（テト口調）：**

---
ちょっと整理するね。

今の話、こんな感じに見える：
「〇〇したいけど、△△な時と□□な時で違う行動が必要」

このまま進むとしたら、どの形が合ってるかな？

A）フローチャート → 状態によって分岐がある話はこれが見やすい
B）ルーティン表 → 毎日同じ流れを作りたい時はこっち
C）箇条書き → まずやることを並べるだけでいい時
D）もう少し話したい → まだ整理できてないならそれでもいい

どれが近い？
---

ユーザーが選んだら、その形式で構成案を作る。

**フローチャートが選ばれた場合の追加確認：**
分岐の軸がまだ曖昧なら「○○と△△で分かれる感じ？それとも別の切り口？」と聞いてから進む。

---

## フェーズ3：構成案の確認

選ばれた形式でプレーンテキストの構成案を出す。

【フローチャートの場合の例】
---
じゃあこんな感じでどう？

🎯 目標：朝の食事をスムーズに済ませる

✨ 時間がある日：しっかり作る（卵料理・味噌汁など）
🌤 普通の日：冷蔵庫・戸棚から選ぶだけ
🌧 しんどい日：コンビニか何も食べずに出発してもOK

👣 次の一歩：今日、「選ぶだけ朝ごはん」を2〜3個買っておく

これでよさそう？変えたいとこある？
---

【ルーティン表の場合の例】
---
じゃあこんな流れでどう？

🌅 朝のルーティン
6:00 起きる
6:05 水を飲む
6:10 朝ごはん（昨日準備したもの）
6:30 着替えて出発

これでよさそう？
---

---

## フェーズ4：承認されたらJSONを出力

ユーザーが「いいね」「OK」「これで」など承認したら、短い一言の後に必ず以下を出力する：

\`\`\`chart
{
  "goal": "目標の一言",
  "plan_a": "状態Aの行動（フローチャートの場合）",
  "plan_b": "状態Bの行動",
  "plan_c": "状態Cの行動",
  "next_step": "次の一歩",
  "mermaid": "graph TB\n    Start[\\"🌅 始まり\\"]\n    Start --> Check{\\"今日の状態は？\\"}\n    Check -->|状態A| PA[\\"Aの行動\\"]\n    Check -->|状態B| PB[\\"Bの行動\\"]\n    Check -->|状態C| PC[\\"Cの行動\\"]\n    PA --> End[\\"今日もOK 🎉\\"]\n    PB --> End\n    PC --> End\n    style PA fill:#e8f5e9,stroke:#2e7d32,stroke-width:2px\n    style PB fill:#fff9c4,stroke:#f57f17,stroke-width:2px\n    style PC fill:#ffebee,stroke:#c62828,stroke-width:2px"
}
\`\`\`

ルール：
- mermaidは会話から出てきた実際の分岐軸・ラベルを使う（「状態A」のような汎用ラベルは使わない）
- ルーティン・箇条書きの場合も同じJSON形式で出力する（mermaidはシンプルな一本道のgraphにする）
- 文字列内の改行は\\n、ダブルクォートは\\"でエスケープ

---

## トーン
- 短い文。友達感覚。敬語なし
- 「そっか」「なるほど」「それいいね」など自然な共感
- テクニカルな話は一切しない
- 着地確認は必ず3往復後。それより前に構成案を出さない`;

// ── STATE ──
let messages = [];
let currentChartData = null;
let isLoading = false;
let apiKey = '';

// ── API KEY ──
function loadApiKey() { try { return localStorage.getItem('teto_api_key') || ''; } catch(e) { return ''; } }
function saveApiKey() {
  const input = document.getElementById('keyInput').value.trim();
  const err = document.getElementById('keyError');
  if (!input.startsWith('sk-ant-')) { err.textContent = '「sk-ant-」で始まるキーを入力してね'; return; }
  try { localStorage.setItem('teto_api_key', input); } catch(e) {}
  apiKey = input; err.textContent = '';
  hideKeyModal(); updateKeyIndicator(true);
}
function showKeyModal() {
  const input = document.getElementById('keyInput');
  input.value = '';
  input.placeholder = apiKey ? 'キーを入力すると上書きされるよ' : 'sk-ant-... を入力してね';
  document.getElementById('keyError').textContent = '';
  document.getElementById('modalTitle').textContent = apiKey ? 'APIキーを変更する' : 'APIキーを設定してね';
  document.getElementById('modalStatus').textContent = apiKey ? '✅ 現在のキーは設定済みだよ' : '';
  document.getElementById('keyModal').classList.remove('hidden');
}
function hideKeyModal() { document.getElementById('keyModal').classList.add('hidden'); }
function updateKeyIndicator(active) {
  const el = document.getElementById('keyIndicator');
  el.textContent = active ? '🔑 APIキー設定済' : '🔑 APIキー未設定';
  el.classList.toggle('active', active);
}

// ── INIT ──
window.addEventListener('load', () => {
  mermaid.initialize({ startOnLoad: false, theme: 'default', flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' } });
  apiKey = loadApiKey();
  if (apiKey) { hideKeyModal(); updateKeyIndicator(true); }
  else { document.getElementById('keyModal').classList.remove('hidden'); }
  document.getElementById('keyInput').addEventListener('keydown', e => { if (e.key === 'Enter') saveApiKey(); });

  addTetoMessage('……（じっとこちらを見ている）\n\nやあ。テトだよ。\nなんか、引っかかってることある？');

  document.getElementById('userInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('userInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
});

// ── CHAT ──
function addTetoMessage(text) { messages.push({ role: 'assistant', content: text }); renderMessage('teto', text); }
function addUserMessage(text) { messages.push({ role: 'user', content: text }); renderMessage('user', text); }

function scrollToBottom() {
  const container = document.getElementById('chatMessages');
  container.scrollTop = container.scrollHeight;
}

function renderMessage(who, text) {
  const container = document.getElementById('chatMessages');
  const typing = container.querySelector('.typing-msg');
  if (typing) typing.remove();

  const msgEl = document.createElement('div');
  msgEl.className = `msg ${who}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = who === 'teto' ? '🦊' : 'you';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text.replace(/```chart[\s\S]*?```/g, '').trim();

  const time = document.createElement('div');
  time.className = 'msg-time';
  const now = new Date();
  time.textContent = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

  const inner = document.createElement('div');
  inner.style.cssText = 'display:flex;flex-direction:column;max-width:min(480px,calc(100% - 46px));';
  inner.appendChild(bubble);
  inner.appendChild(time);

  if (who === 'user') { msgEl.appendChild(inner); msgEl.appendChild(avatar); }
  else { msgEl.appendChild(avatar); msgEl.appendChild(inner); }

  container.appendChild(msgEl);
  scrollToBottom();
}

function showTyping() {
  const container = document.getElementById('chatMessages');
  const wrapper = document.createElement('div');
  wrapper.className = 'msg teto typing-msg';
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🦊';
  const ind = document.createElement('div');
  ind.className = 'typing-indicator';
  ind.innerHTML = '<span></span><span></span><span></span>';
  wrapper.appendChild(avatar);
  wrapper.appendChild(ind);
  container.appendChild(wrapper);
  scrollToBottom();
}

// ── SEND ──
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  addUserMessage(text);
  input.value = ''; input.style.height = 'auto';
  if (!apiKey) { showKeyModal(); return; }
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: TETO_SYSTEM,
        messages: messages.slice(-16)
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'ごめん、うまく受け取れなかった…もう一度話しかけて';
    addTetoMessage(reply);

    // chartブロック検出 → プレビューカードを挿入
    const chartMatch = reply.match(/```chart\n([\s\S]*?)\n```/);
    if (chartMatch) {
      try {
        const chartData = JSON.parse(chartMatch[1]);
        currentChartData = chartData;
        await insertPreviewCard(chartData);
      } catch(e) {
        console.error('Chart parse error:', e);
        addTetoMessage('図の描画に失敗した…「もう一度図を作って」って話しかけてみて');
      }
    }
  } catch(e) {
    console.error(e);
    addTetoMessage('ちょっと通信が途切れた…もう一度試してみて');
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

// ── プレビューカードをチャットに挿入 ──
async function insertPreviewCard(data) {
  const container = document.getElementById('chatMessages');

  // カードのラッパー（テト側メッセージと同じ並び）
  const wrapper = document.createElement('div');
  wrapper.className = 'msg teto';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🦊';

  const card = document.createElement('div');
  card.className = 'chart-preview-card';
  card.style.maxWidth = 'min(560px, calc(100% - 46px))';

  card.innerHTML = `
    <div class="chart-preview-header">
      <span>📋 実行計画プレビュー</span>
      <span class="preview-tag">PREVIEW</span>
    </div>
    <div class="chart-preview-body">
      <div class="plan-row"><div class="plan-label">目標</div><div class="plan-value">${data.goal||'—'}</div></div>
      <div class="plan-row"><div class="plan-label">状態 A</div><div class="plan-value plan-a">${data.plan_a||'—'}</div></div>
      <div class="plan-row"><div class="plan-label">状態 B</div><div class="plan-value plan-b">${data.plan_b||'—'}</div></div>
      <div class="plan-row"><div class="plan-label">状態 C</div><div class="plan-value plan-c">${data.plan_c||'—'}</div></div>
      <div class="plan-row"><div class="plan-label">次の一歩</div><div class="plan-value">${data.next_step||'—'}</div></div>
    </div>
    <div class="chart-preview-mermaid">
      <div class="mermaid-label">FLOWCHART</div>
      <div class="spinner" id="chartSpinner"></div>
    </div>
    <div class="chart-preview-actions">
      <p>これでよければHTMLに保存できるよ 🦊</p>
      <button class="btn-copy-html" onclick="copyHTML()">コピー</button>
      <button class="btn-save-html" onclick="dropHTML()">⬇ HTMLを保存</button>
    </div>`;

  wrapper.appendChild(avatar);
  wrapper.appendChild(card);
  container.appendChild(wrapper);
  scrollToBottom();

  // Mermaid描画
  if (data.mermaid) {
    const mermaidWrap = card.querySelector('.chart-preview-mermaid');
    const spinner = card.querySelector('#chartSpinner');
    const chartEl = document.createElement('div');
    chartEl.className = 'mermaid';
    chartEl.style.maxWidth = '100%';
    chartEl.textContent = data.mermaid;
    mermaidWrap.appendChild(chartEl);
    try {
      await mermaid.run({ nodes: [chartEl] });
      const svg = chartEl.querySelector('svg');
      if (svg) { svg.style.maxWidth = '100%'; svg.style.height = 'auto'; svg.removeAttribute('width'); }
    } catch(e) {
      chartEl.textContent = '図の描画に失敗。テトに「図を書き直して」と伝えてみて。';
    } finally {
      if (spinner) spinner.remove();
    }
  }

  scrollToBottom();
}

// ── HTML DROP（ボタン押したら保存） ──
function dropHTML() {
  try {
    const html = generateHTML();
    if (!html) return;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `teto-flo-${new Date().toISOString().slice(0,10)}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 3000);
  } catch(e) {
    copyHTML(); // ブロックされた場合はコピーにフォールバック
  }
}

// ── COPY HTML ──
async function copyHTML() {
  const html = generateHTML();
  if (!html) return;
  try {
    await navigator.clipboard.writeText(html);
    // 一時的にフィードバック
    const btns = document.querySelectorAll('.btn-copy-html');
    btns.forEach(btn => {
      const orig = btn.textContent;
      btn.textContent = '✅';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    });
  } catch(e) {
    // フォールバック：テキストエリアモーダル
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;';
    overlay.innerHTML = `<div style="background:#fff;border:3px solid #1a1a2e;border-radius:4px;padding:24px;max-width:560px;width:100%;box-shadow:6px 6px 0 #1a1a2e;">
      <div style="font-weight:900;font-size:16px;margin-bottom:8px;">📋 HTMLをコピーしてね</div>
      <div style="font-size:12px;color:#666;margin-bottom:12px;">全選択（Ctrl+A）→ コピー（Ctrl+C）→ メモ帳に貼り付けて .html で保存</div>
      <textarea style="width:100%;height:200px;font-size:11px;font-family:monospace;border:2px solid #e8e0d4;padding:8px;resize:none;outline:none;" readonly onclick="this.select()"></textarea>
      <button onclick="this.closest('div').parentElement.remove()" style="margin-top:12px;background:#1a1a2e;color:#fff;border:none;padding:8px 20px;border-radius:4px;cursor:pointer;font-family:monospace;font-size:12px;">閉じる</button>
    </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('textarea').value = html;
    overlay.querySelector('textarea').select();
  }
}
